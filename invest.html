<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOVEMIN | Investment Terminal</title>
    <link rel="stylesheet" href="style.css?v=5.2">
    <style>
        .invest-container { margin-top: 40px; display: flex; flex-direction: column; gap: 50px; }
        .widget-section { background: #000; border: 1px solid #111; padding: 30px; }
        .section-title { 
            font-size: 0.9rem; letter-spacing: 3px; color: #fff; /* 제목 더 밝게 */
            margin-bottom: 30px; text-transform: uppercase; 
            border-left: 3px solid #d4a373; padding-left: 15px;
        }

        /* 레이아웃 및 차트 영역 */
        .news-calendar-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        #chart-area { width: 100%; height: 550px; background: #000; border: 1px solid #222; margin-bottom: 30px; display: none; }

        /* 테이블 가시성 대폭 강화 */
        #my-watchlist { width: 100%; border-collapse: collapse; font-size: 1.1rem; color: #fff; }
        #my-watchlist th { border-bottom: 2px solid #333; padding: 15px 10px; color: #999; text-align: left; font-size: 0.8rem; }
        #my-watchlist td { padding: 30px 10px; border-bottom: 1px solid #111; vertical-align: top; }
        #invest-body tr:hover { background: #0d0d0d; cursor: pointer; transition: 0.2s; }
        
        .stock-name { font-size: 1.3rem; font-weight: 800; color: #fff; display: block; margin-bottom: 8px; }
        .badge { background: #d4a373; color: #000; font-size: 0.7rem; font-weight: 700; padding: 4px 10px; border-radius: 4px; }
        
        /* 대비가 뚜렷한 상승/하락 색상 */
        .up { color: #ff3b3b !important; } 
        .down { color: #3b82ff !important; }

        /* 메타 데이터 밝기 수정 (가시성 확보) */
        .meta-label { color: #777; font-size: 0.75rem; margin-right: 6px; }
        .meta-value { color: #ffffff; font-size: 1rem; font-family: 'Courier New', monospace; font-weight: 600; }
        .stock-note { color: #dddddd !important; font-size: 1.05rem; line-height: 1.7; }

        /* 52주 게이지 바 디자인 강화 */
        .range-container { width: 100%; height: 10px; background: #1a1a1a; position: relative; margin-top: 15px; border-radius: 5px; overflow: visible; }
        .range-bar { position: absolute; height: 100%; background: #d4a373; border-radius: 5px; opacity: 0.2; }
        .current-dot { 
            position: absolute; width: 14px; height: 14px; background: #fff; 
            top: -2px; transform: translateX(-50%); border-radius: 50%; 
            box-shadow: 0 0 10px rgba(255,255,255,0.8); z-index: 2;
        }

        @media (max-width: 1024px) { 
            .news-calendar-grid { grid-template-columns: 1fr; } 
            #my-watchlist { font-size: 0.95rem; } 
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">ABOVEMIN</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="invest.html" style="color:#fff">Invest</a></li>
            </ul>
        </nav>
    </header>

    <div class="container invest-container">
        <div style="margin-bottom: -20px;">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {
                    "symbols": [
                        {"proName": "KRX:KOSPI", "title": "KOSPI"},
                        {"proName": "KRX:KOSDAQ", "title": "KOSDAQ"},
                        {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
                        {"proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100"},
                        {"proName": "FX_IDC:USDKRW", "title": "USD/KRW"}
                    ],
                    "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "kr"
                }
                </script>
            </div>
        </div>

        <div id="chart-area" class="widget-section"></div>

        <div class="widget-section">
            <div class="section-title">Global Heatmaps (US & KR)</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                <div id="heatmap-us" style="height: 450px;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                        {
                          "dataSource": "S&P500",
                          "blockSize": "market_cap",
                          "blockColor": "change",
                          "locale": "kr",
                          "colorTheme": "dark",
                          "hasTopBar": false,
                          "isTransparent": true,
                          "width": "100%",
                          "height": "100%"
                        }
                        </script>
                    </div>
                </div>
                <div id="heatmap-kr" style="height: 450px;">
                    <div class="tradingview-widget-container">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                        {
                          "dataSource": "SouthKorea",
                          "blockSize": "market_cap",
                          "blockColor": "change",
                          "locale": "kr",
                          "colorTheme": "dark",
                          "hasTopBar": false,
                          "isTransparent": true,
                          "width": "100%",
                          "height": "100%"
                        }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <div class="news-calendar-grid">
            <div class="widget-section" style="height: 850px;">
                <div class="section-title">Market Intelligence</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 60px);">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    { "feedMode": "all_symbols", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "kr" }
                    </script>
                </div>
            </div>
            <div class="widget-section" style="height: 850px;">
                <div class="section-title">Economic Events</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 60px);">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "kr", "importanceFilter": "-1,0,1" }
                    </script>
                </div>
            </div>
        </div>

        <div class="widget-section">
            <div class="section-title">Portfolio Scrap & Quantitative Analysis</div>
            <table id="my-watchlist">
                <thead>
                    <tr>
                        <th style="width: 22%;">STOCK</th>
                        <th style="width: 18%;">PRICE / CHANGE</th>
                        <th style="width: 22%;">VALUATION</th>
                        <th style="width: 15%;">52W RANGE</th>
                        <th style="width: 23%;">INSIGHT NOTE</th>
                    </tr>
                </thead>
                <tbody id="invest-body"></tbody>
            </table>
        </div>
    </div>

    <footer><div class="copyright">&copy; 2026 ABOVE MIN. ALL RIGHTS RESERVED.</div></footer>
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js?v=5.2"></script>
</body>
</html>
