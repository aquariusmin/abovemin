<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOVEMIN | Investment Terminal</title>
    <link rel="stylesheet" href="style.css?v=8.0">
    <style>
        /* 1. 기본 스타일 및 가시성 강화 */
        :root { --gold: #d4a373; --bg: #000; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); }
        .invest-container { margin-top: 40px; display: flex; flex-direction: column; gap: 50px; padding-bottom: 80px; }
        .widget-section { background: var(--bg); border: 1px solid #111; padding: 25px; border-radius: 10px; }
        
        .section-title { 
            font-size: 1.1rem; letter-spacing: 3px; color: #fff; 
            margin-bottom: 30px; text-transform: uppercase; 
            border-left: 4px solid var(--gold); padding-left: 15px; font-weight: 700;
        }

        /* 2. 히트맵 영역: 작아짐 방지 및 고정 높이 */
        .heatmap-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .heatmap-container { height: 500px; width: 100%; position: relative; }

        /* 3. 뉴스 및 캘린더 레이아웃 */
        .news-calendar-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 25px; }
        #chart-area { width: 100%; height: 550px; border: 2px solid #222; margin-bottom: 20px; display: none; }

        /* 4. 분석 테이블: 글자 크기 및 모바일 스크롤 */
        .table-responsive { width: 100%; overflow-x: auto; }
        #my-watchlist { width: 100%; border-collapse: collapse; font-size: 1.15rem; min-width: 900px; }
        #my-watchlist th { border-bottom: 2px solid #333; padding: 15px; color: #888; text-align: left; font-size: 0.8rem; }
        #my-watchlist td { padding: 30px 15px; border-bottom: 1px solid #111; vertical-align: top; }
        #invest-body tr:hover { background: #0a0a0a; cursor: pointer; }
        
/* Valuation 섹션 디자인 보강 */
.valuation-box {
    display: flex;
    flex-direction: column;
    gap: 8px; /* 지표 간 간격 */
}

.meta-item {
    display: flex;
    justify-content: space-between; /* 라벨과 수치를 양끝으로 정렬 */
    align-items: center;
    border-bottom: 1px solid #111; /* 구분선 추가 */
    padding-bottom: 4px;
}

.meta-label { 
    color: #666; 
    font-size: 0.7rem; 
    font-weight: 700; 
    letter-spacing: 1px;
}

.meta-value { 
    color: #ffffff !important; 
    font-size: 0.95rem; 
    font-family: 'Courier New', monospace; 
    font-weight: 600; 
}

/* 조건부 서식 색상 */
.good { color: #00ff88 !important; text-shadow: 0 0 5px rgba(0,255,136,0.3); } /* 저평가 */
.warning { color: #ffbb00 !important; } /* 고변동 */

/* 비고란(Note) 가시성 추가 개선 */
.stock-note { 
    color: #bbb !important; 
    font-size: 0.95rem; 
    line-height: 1.6;
    background: #080808;
    padding: 10px;
    border-radius: 4px;
}

        .stock-name { font-size: 1.35rem; font-weight: 800; color: #fff; display: block; margin-bottom: 8px; }
        .badge { background: var(--gold); color: #000; font-size: 0.75rem; font-weight: 800; padding: 4px 10px; border-radius: 4px; }
        .up { color: #ff3b3b !important; } .down { color: #3b82ff !important; }
        .meta-value { color: #fff !important; font-size: 1rem; font-weight: 600; }
        .stock-note { color: #ddd !important; font-size: 1.1rem; line-height: 1.7; }

        /* 5. 52주 게이지 */
        .range-container { width: 100%; height: 10px; background: #111; position: relative; margin-top: 15px; border-radius: 5px; }
        .range-bar { position: absolute; height: 100%; background: var(--gold); border-radius: 5px; opacity: 0.2; }
        .current-dot { position: absolute; width: 14px; height: 14px; background: #fff; top: -2px; transform: translateX(-50%); border-radius: 50%; box-shadow: 0 0 10px #fff; z-index: 2; }

        /* --- 6. 모바일 최적화 (핵심) --- */
        @media (max-width: 1024px) {
            .heatmap-grid, .news-calendar-grid { grid-template-columns: 1fr; }
            .heatmap-container { height: 400px; } /* 모바일에서는 높이 약간 축소 */
            .section-title { font-size: 1rem; }
            .invest-container { gap: 30px; }
            .stock-name { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">ABOVEMIN</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="invest.html" style="color:#fff">Invest</a></li>
            </ul>
        </nav>
    </header>

    <div class="container invest-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "KRX:KOSPI", "title": "KOSPI"},
                    {"proName": "KRX:KOSDAQ", "title": "KOSDAQ"},
                    {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
                    {"proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100"},
                    {"proName": "FX_IDC:USDKRW", "title": "USD/KRW"}
                ],
                "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "kr"
            }
            </script>
        </div>

        <div id="chart-area" class="widget-section"></div>

        <div class="widget-section">
            <div class="section-title">Global Markets Heatmap (US & KR)</div>
            <div class="heatmap-grid">
                <div class="heatmap-container">
                    <div style="font-size:0.7rem; color:#555; margin-bottom:10px; letter-spacing:2px;">USA S&P 500</div>
                    <div class="tradingview-widget-container" style="height: calc(100% - 25px);">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                        {
                          "dataSource": "S&P500",
                          "blockSize": "market_cap",
                          "blockColor": "change",
                          "locale": "kr",
                          "colorTheme": "dark",
                          "hasTopBar": false,
                          "isTransparent": true,
                          "width": "100%",
                          "height": "100%"
                        }
                        </script>
                    </div>
                </div>
                <div class="heatmap-container">
                    <div style="font-size:0.7rem; color:#555; margin-bottom:10px; letter-spacing:2px;">SOUTH KOREA</div>
                    <div class="tradingview-widget-container" style="height: calc(100% - 25px);">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                        {
                          "dataSource": "SouthKorea",
                          "blockSize": "market_cap",
                          "blockColor": "change",
                          "locale": "kr",
                          "colorTheme": "dark",
                          "hasTopBar": false,
                          "isTransparent": true,
                          "width": "100%",
                          "height": "100%"
                        }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <div class="news-calendar-grid">
            <div class="widget-section" style="height: 800px;">
                <div class="section-title">Market Intelligence</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 60px);">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    { "feedMode": "all_symbols", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "kr" }
                    </script>
                </div>
            </div>
            <div class="widget-section" style="height: 800px;">
                <div class="section-title">Economic Events</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 60px);">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "kr", "importanceFilter": "-1,0,1" }
                    </script>
                </div>
            </div>
        </div>

        <div class="widget-section">
            <div class="section-title">Investment Analysis Scraps</div>
            <div class="table-responsive">
                <table id="my-watchlist">
                    <thead>
                        <tr>
                            <th style="width: 20%;">SYMBOL</th>
                            <th style="width: 15%;">PRICE/CHG</th>
                            <th style="width: 20%;">VALUE METRICS</th>
                            <th style="width: 15%;">52W RANGE</th>
                            <th style="width: 30%;">INSIGHT NOTE</th>
                        </tr>
                    </thead>
                    <tbody id="invest-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer><div class="copyright">&copy; 2026 ABOVE MIN. ALL RIGHTS RESERVED.</div></footer>
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js?v=8.0"></script>
</body>
</html>
