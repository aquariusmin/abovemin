<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOVEMIN | Investment Terminal</title>
    <link rel="stylesheet" href="style.css?v=6.0">
    <style>
        .invest-container { margin-top: 40px; display: flex; flex-direction: column; gap: 60px; }
        .widget-section { background: #000; border: 1px solid #111; padding: 35px; }
        .section-title { 
            font-size: 1rem; letter-spacing: 4px; color: #fff; 
            margin-bottom: 30px; text-transform: uppercase; 
            border-left: 4px solid #d4a373; padding-left: 20px;
            font-weight: 700;
        }

        /* 레이아웃 및 차트 */
        .news-calendar-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 30px; }
        #chart-area { width: 100%; height: 550px; background: #000; border: 2px solid #222; margin-bottom: 30px; display: none; }

        /* 테이블 가독성: 글자 크기 대폭 확대 및 고대비 */
        #my-watchlist { width: 100%; border-collapse: collapse; font-size: 1.2rem; color: #fff; }
        #my-watchlist th { border-bottom: 2px solid #333; padding: 20px 10px; color: #aaa; text-align: left; font-size: 0.85rem; }
        #my-watchlist td { padding: 35px 15px; border-bottom: 1px solid #111; vertical-align: top; }
        #invest-body tr:hover { background: #0d0d0d; cursor: pointer; }
        
        .stock-name { font-size: 1.4rem; font-weight: 800; color: #fff; display: block; margin-bottom: 10px; letter-spacing: -0.5px; }
        .badge { background: #d4a373; color: #000; font-size: 0.75rem; font-weight: 800; padding: 5px 12px; border-radius: 4px; }
        
        /* 상승/하락 색상 강화 */
        .up { color: #ff3b3b !important; } 
        .down { color: #3b82ff !important; }

        /* 메타 데이터: 아주 밝은 색으로 변경 */
        .meta-label { color: #888; font-size: 0.8rem; margin-right: 8px; }
        .meta-value { color: #ffffff !important; font-size: 1.05rem; font-family: monospace; font-weight: 600; }
        .stock-note { color: #ffffff !important; font-size: 1.15rem; line-height: 1.8; font-weight: 300; }

        /* 52주 게이지 바 강화 */
        .range-container { width: 100%; height: 12px; background: #1a1a1a; position: relative; margin-top: 20px; border-radius: 6px; }
        .range-bar { position: absolute; height: 100%; background: #d4a373; border-radius: 6px; opacity: 0.2; }
        .current-dot { 
            position: absolute; width: 16px; height: 16px; background: #fff; 
            top: -2px; transform: translateX(-50%); border-radius: 50%; 
            box-shadow: 0 0 12px rgba(255,255,255,1); z-index: 5;
        }

        @media (max-width: 1024px) { 
            .news-calendar-grid { grid-template-columns: 1fr; } 
            #my-watchlist { font-size: 1rem; } 
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">ABOVEMIN</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="invest.html" style="color:#fff">Invest</a></li>
            </ul>
        </nav>
    </header>

    <div class="container invest-container">
        <div style="margin-bottom: -20px;">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {
                    "symbols": [
                        {"proName": "KRX:KOSPI", "title": "KOSPI"},
                        {"proName": "KRX:KOSDAQ", "title": "KOSDAQ"},
                        {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
                        {"proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100"},
                        {"proName": "FX_IDC:USDKRW", "title": "USD/KRW"}
                    ],
                    "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "kr"
                }
                </script>
            </div>
        </div>

        <div id="chart-area" class="widget-section"></div>

        <div class="widget-section">
            <div class="section-title">Global Markets Heatmap</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
                <div class="heatmap-box">
                    <div style="color:#666; font-size:0.75rem; margin-bottom:15px; letter-spacing:2px;">UNITED STATES (S&P 500)</div>
                    <div class="tradingview-widget-container" style="height: 450px;">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js?v=usa" async>
                        {
                          "dataSource": "S&P500",
                          "blockSize": "market_cap",
                          "blockColor": "change",
                          "locale": "kr",
                          "colorTheme": "dark",
                          "hasTopBar": false,
                          "isTransparent": true,
                          "width": "100%",
                          "height": "100%"
                        }
                        </script>
                    </div>
                </div>
                <div class="heatmap-box">
                    <div style="color:#666; font-size:0.75rem; margin-bottom:15px; letter-spacing:2px;">SOUTH KOREA (KOSPI/KOSDAQ)</div>
                    <div class="tradingview-widget-container" style="height: 450px;">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js?v=korea" async>
                        {
                          "dataSource": "SouthKorea",
                          "blockSize": "market_cap",
                          "blockColor": "change",
                          "locale": "kr",
                          "colorTheme": "dark",
                          "hasTopBar": false,
                          "isTransparent": true,
                          "width": "100%",
                          "height": "100%"
                        }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <div class="news-calendar-grid">
            <div class="widget-section" style="height: 900px;">
                <div class="section-title">Market Intelligence</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 60px);">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                    { "feedMode": "all_symbols", "isTransparent": true, "displayMode": "regular", "width": "100%", "height": "100%", "colorTheme": "dark", "locale": "kr" }
                    </script>
                </div>
            </div>
            <div class="widget-section" style="height: 900px;">
                <div class="section-title">Economic Events</div>
                <div class="tradingview-widget-container" style="height: calc(100% - 60px);">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-events.js" async>
                    { "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%", "locale": "kr", "importanceFilter": "-1,0,1" }
                    </script>
                </div>
            </div>
        </div>

        <div class="widget-section">
            <div class="section-title">Portfolio Analysis Scraps</div>
            <table id="my-watchlist">
                <thead>
                    <tr>
                        <th style="width: 22%;">종목 (SYMBOL)</th>
                        <th style="width: 18%;">현재가 / 변동</th>
                        <th style="width: 20%;">재무 지표 (VALUE)</th>
                        <th style="width: 15%;">52주 범위</th>
                        <th style="width: 25%;">분석 메모 (INSIGHT)</th>
                    </tr>
                </thead>
                <tbody id="invest-body"></tbody>
            </table>
        </div>
    </div>

    <footer><div class="copyright">&copy; 2026 ABOVE MIN. ALL RIGHTS RESERVED.</div></footer>
    
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js?v=6.0"></script>
</body>
</html>
