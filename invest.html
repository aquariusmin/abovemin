<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOVEMIN | Investment Terminal</title>
    <link rel="stylesheet" href="style.css?v=9.0">
    <style>
        :root { --gold: #d4a373; --bg: #000; --border: #1a1a1a; --white: #ffffff; }
        body { background-color: var(--bg); color: var(--white); }
        .invest-container { margin-top: 40px; display: flex; flex-direction: column; gap: 40px; padding-bottom: 100px; }
        .widget-section { background: var(--bg); border: 1px solid var(--border); padding: 30px; border-radius: 12px; }
        
        .section-title { 
            font-size: 1.1rem; letter-spacing: 3px; color: var(--white); 
            margin-bottom: 30px; text-transform: uppercase; 
            border-left: 4px solid var(--gold); padding-left: 15px; font-weight: 700;
        }

        /* 시장 구분 제목 */
        .market-zone-title { 
            font-size: 1.1rem; color: var(--gold); margin: 40px 0 20px 0; 
            letter-spacing: 2px; display: flex; align-items: center; gap: 10px;
        }

        /* 테이블 디자인 및 가시성 */
        .table-wrapper { width: 100%; overflow-x: auto; margin-bottom: 30px; }
        .watchlist-table { width: 100%; border-collapse: collapse; font-size: 1.15rem; min-width: 900px; }
        .watchlist-table th { border-bottom: 2px solid #333; padding: 15px; color: #888; text-align: left; font-size: 0.8rem; }
        .watchlist-table td { padding: 30px 15px; border-bottom: 1px solid #111; vertical-align: top; }
        .watchlist-table tr:hover { background: #0a0a0a; cursor: pointer; }
        
        .stock-name { font-size: 1.35rem; font-weight: 800; color: #fff; display: block; margin-bottom: 8px; }
        .badge { background: var(--gold); color: #000; font-size: 0.75rem; font-weight: 800; padding: 4px 10px; border-radius: 4px; }
        
        /* 등락 및 지표 색상 */
        .up { color: #ff3b3b !important; } .down { color: #3b82ff !important; }
        .valuation-box { display: flex; flex-direction: column; gap: 8px; }
        .meta-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .meta-label { color: #666; font-size: 0.75rem; font-weight: 700; }
        .meta-value { color: #fff; font-size: 1rem; font-family: monospace; font-weight: 600; }
        .stock-note { color: #ccc !important; font-size: 1rem; line-height: 1.7; background: #080808; padding: 12px; border-radius: 6px; }

        /* 반응형 설정 */
        @media (max-width: 1024px) {
            .heatmap-grid, .news-calendar-grid { grid-template-columns: 1fr; }
            .market-zone-title { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">ABOVEMIN</a></div>
        <nav><ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="invest.html" style="color:#fff">Invest</a></li>
        </ul></nav>
    </header>

    <div class="container invest-container">
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
            {
                "symbols": [
                    {"proName": "KRX:KOSPI", "title": "KOSPI"},
                    {"proName": "KRX:KOSDAQ", "title": "KOSDAQ"},
                    {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
                    {"proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100"},
                    {"proName": "FX_IDC:USDKRW", "title": "USD/KRW"}
                ],
                "colorTheme": "dark", "isTransparent": true, "displayMode": "adaptive", "locale": "kr"
            }
            </script>
        </div>

        <div id="chart-area" class="widget-section"></div>

        <div class="widget-section">
            <div class="section-title">Market Heatmaps</div>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div style="height: 450px;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                    { "dataSource": "S&P500", "blockSize": "market_cap", "blockColor": "change", "locale": "kr", "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%" }
                    </script>
                </div>
                <div style="height: 450px;">
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js" async>
                    { "dataSource": "SouthKorea", "blockSize": "market_cap", "blockColor": "change", "locale": "kr", "colorTheme": "dark", "isTransparent": true, "width": "100%", "height": "100%" }
                    </script>
                </div>
            </div>
        </div>

        <div class="widget-section">
            <div class="section-title">Portfolio Scraps & Valuation</div>

            <h3 class="market-zone-title">🇰🇷 KOREA MARKET</h3>
            <div class="table-wrapper">
                <table class="watchlist-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">STOCK</th>
                            <th style="width: 20%;">PRICE / CHG</th>
                            <th style="width: 25%;">VALUATION (PE/EPS/BETA)</th>
                            <th style="width: 15%;">52W RANGE</th>
                            <th style="width: 20%;">INSIGHT NOTE</th>
                        </tr>
                    </thead>
                    <tbody id="kr-invest-body"></tbody>
                </table>
            </div>

            <h3 class="market-zone-title">🇺🇸 US MARKET</h3>
            <div class="table-wrapper">
                <table class="watchlist-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">STOCK</th>
                            <th style="width: 20%;">PRICE / CHG</th>
                            <th style="width: 25%;">VALUATION (PE/EPS/BETA)</th>
                            <th style="width: 15%;">52W RANGE</th>
                            <th style="width: 20%;">INSIGHT NOTE</th>
                        </tr>
                    </thead>
                    <tbody id="us-invest-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer><div class="copyright">&copy; 2026 ABOVE MIN. ALL RIGHTS RESERVED.</div></footer>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js?v=9.0"></script>
</body>
</html>
