<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABOVEMIN | Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html">ABOVEMIN</a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="shop.html" style="color:#fff">Shop</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="grid" id="product-grid"></div>

        <div id="product-detail" class="detail-container" style="display: none;">
            <hr class="divider">
            <div class="detail-content">
                <div class="detail-text">
                    <h2 id="detail-title"></h2>
                    <p id="detail-price" class="price"></p>
                    <p id="detail-description" class="description"></p>
                </div>
                
                <div class="order-box">
                    <h3>ORDER FORM</h3>
                    <form id="orderForm">
                        <label>주문 상품</label>
                        <input type="text" id="order-item" name="order_item" readonly>
                        
                        <label>주문자 정보</label>
                        <input type="text" name="name" placeholder="성함" required>
                        <input type="text" name="phone" placeholder="연락처" required>
                        
                        <label>수량 선택</label>
                        <select id="quantity-select" onchange="checkQuantity(this)">
                            <option value="1">1개</option>
                            <option value="2">2개</option>
                            <option value="3">3개</option>
                            <option value="5">5개</option>
                            <option value="direct">직접 입력</option>
                        </select>
                        <input type="number" id="quantity-direct" name="quantity" placeholder="수량 입력 (예: 6)" style="display:none; margin-top:10px;">
                        
                        
                        <label>배송지 주소</label>
                        <input type="text" id="address" name="address" placeholder="주소 찾기 (클릭)" readonly onclick="findAddr()" required>
                        <input type="text" id="detailAddress" name="detail_address" placeholder="상세 주소 입력" required>
                        
                        <button type="submit" class="buy-btn" id="submitBtn">ORDER NOW</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 Sangmin Lee. ALL RIGHTS RESERVED.</footer>

    <script src="script.js"></script>
</body>
</html>
