<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ABOVEMIN | Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="data.js"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">ABOVEMIN</a></div>
        <nav><ul><li><a href="index.html">Home</a></li><li><a href="gallery.html">Gallery</a></li><li><a href="shop.html" style="color:#fff">Shop</a></li><li><a href="about.html">About</a></li></ul></nav>
    </header>
    <div class="container">
        <div class="grid" id="product-grid"></div>
        <div id="product-detail" class="detail-container" style="display: none;">
            <hr class="divider">
            <div class="detail-content">
                <div class="detail-text"><h2 id="detail-title"></h2><p id="detail-price" class="price"></p><p id="detail-description" class="description"></p></div>
                <div class="order-box">
                    <h3>ORDER FORM</h3>
                    <form id="orderForm">
                        <label>ITEM</label><input type="text" id="order-item" name="order_item" readonly>
                        <label>NAME</label><input type="text" name="name" required>
                        <label>CONTACT</label><input type="text" name="phone" required>
                        <label>QUANTITY</label>
                        <select id="quantity-select" onchange="checkQuantity(this)">
                            <option value="1">1개</option><option value="2">2개</option><option value="direct">직접 입력</option>
                        </select>
                        <input type="number" id="quantity-direct" name="quantity" style="display:none;" min="1">
                        <label>ADDRESS</label>
                        <input type="text" id="address" name="address" placeholder="클릭하여 검색" readonly onclick="findAddr()" required>
                        <input type="text" id="detailAddress" name="detail_address" placeholder="상세주소" required>
                        <button type="submit" class="buy-btn" id="submitBtn">PLACE ORDER</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
