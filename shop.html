<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABOVEMIN | Shop</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
</head>
<body>
    <header>
        <div class="logo"><a href="index.html">ABOVEMIN</a></div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="shop.html" style="color:#fff">Shop</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="grid" id="product-grid"></div>

        <div id="product-detail" class="detail-container" style="display: none;">
            <hr class="divider">
            <div class="detail-content">
                <div class="detail-text">
                    <h2 id="detail-title"></h2>
                    <p id="detail-price" class="price" style="color:#d4a373; font-size:1.2rem;"></p>
                    <p id="detail-description" class="description"></p>
                </div>
                
                <div class="order-box">
                    <h3>ORDER FORM</h3>
                    <form id="orderForm">
                        <label>ITEM</label>
                        <input type="text" id="order-item" name="order_item" readonly>
                        
                        <label>NAME</label>
                        <input type="text" name="name" required>
                        
                        <label>CONTACT</label>
                        <input type="text" name="phone" placeholder="숫자만 입력" required>
                        
                        <label>QUANTITY</label>
                        <select id="quantity-select" onchange="checkQuantity(this)">
                            <option value="1">1개</option>
                            <option value="2">2개</option>
                            <option value="3">3개</option>
                            <option value="direct">직접 입력</option>
                        </select>
                        <input type="number" id="quantity-direct" name="quantity" placeholder="수량 직접 입력" style="display:none; margin-top:10px;">
                        
                        <label>ADDRESS</label>
                        <input type="text" id="address" name="address" placeholder="클릭하여 검색" readonly onclick="findAddr()" required>
                        <input type="text" id="detailAddress" name="detail_address" placeholder="상세주소 입력" required>
                        
                        <button type="submit" class="buy-btn" id="submitBtn">PLACE ORDER</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="index.html">HOME</a>
            <a href="gallery.html">GALLERY</a>
            <a href="https://instagram.com/sangmin__02" target="_blank">INSTAGRAM</a>
        </div>
        <div class="copyright">&copy; 2026 ABOVE MIN. ALL RIGHTS RESERVED.</div>
    </footer>

    <script src="script.js?v=1.2"></script>
</body>
</html>
